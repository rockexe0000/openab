{{- range $name, $cfg := .Values.agents }}
{{- if ne (include "openab.agentEnabled" $cfg) "false" }}
{{- $d := dict "ctx" $ "agent" $name "cfg" $cfg }}
{{- $pvcEnabled := not (eq (include "openab.persistenceEnabled" $cfg) "false") }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openab.agentFullname" $d }}
  labels:
    {{- include "openab.labels" $d | nindent 4 }}
spec:
  # Hardcoded for PVC-backed agents: RWO volumes can't be shared across pods,
  # so rolling updates and multiple replicas are not supported.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "openab.selectorLabels" $d | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ $cfg | toJson | sha256sum }}
      labels:
        {{- include "openab.selectorLabels" $d | nindent 8 }}
    spec:
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cfg.extraInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: openab
          image: {{ include "openab.agentImage" $d | quote }}
          imagePullPolicy: {{ include "openab.agentImagePullPolicy" $d }}
          {{- with $.Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- if and (ne (toString ($cfg.discord).enabled) "false") ($cfg.discord).botToken }}
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $d }}
                  key: discord-bot-token
            {{- end }}
            {{- if and ($cfg.slack).enabled ($cfg.slack).botToken }}
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $d }}
                  key: slack-bot-token
            {{- end }}
            {{- if and ($cfg.slack).enabled ($cfg.slack).appToken }}
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $d }}
                  key: slack-app-token
            {{- end }}
            {{- if and ($cfg.stt).enabled ($cfg.stt).apiKey }}
            - name: STT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $d }}
                  key: stt-api-key
            {{- end }}
            {{- if and ($cfg.gateway).enabled ($cfg.gateway).token }}
            - name: GATEWAY_WS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $d }}
                  key: gateway-ws-token
            {{- end }}
            - name: HOME
              value: {{ $cfg.workingDir | default "/home/agent" }}
            {{- range $k, $v := $cfg.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- include "openab.validateSecretEnv" (dict "secretEnv" $cfg.secretEnv "agentName" $name) }}
            {{- range $cfg.secretEnv }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          {{- with $cfg.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $cfg.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/openab
              readOnly: true
            {{- if $pvcEnabled }}
            - name: data
              mountPath: {{ $cfg.workingDir | default "/home/agent" }}
            {{- end }}
            {{- if $cfg.agentsMd }}
            - name: config
              mountPath: {{ $cfg.workingDir | default "/home/agent" }}/AGENTS.md
              subPath: AGENTS.md
            - name: config
              mountPath: {{ $cfg.workingDir | default "/home/agent" }}/CLAUDE.md
              subPath: AGENTS.md
            - name: config
              mountPath: {{ $cfg.workingDir | default "/home/agent" }}/GEMINI.md
              subPath: AGENTS.md
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- with $cfg.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- with $cfg.extraContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if eq (($cfg.gateway).colocated | toString) "true" }}
      {{- $gwCfg := omit $cfg "nameOverride" }}
      {{- $gwD := dict "ctx" $ "agent" (printf "%s-gateway" $name) "cfg" $gwCfg }}
      {{- $hasTelegram := (($cfg.gateway).telegram).botToken }}
      {{- $hasLine := (($cfg.gateway).line).channelSecret }}
      {{- $hasTeams := and (($cfg.gateway).teams).appId (($cfg.gateway).teams).appSecret }}
      {{- $hasFeishu := and (($cfg.gateway).feishu).appId (($cfg.gateway).feishu).appSecret }}
      {{- $hasGoogleChat := or (($cfg.gateway).googleChat).saKeyJson (($cfg.gateway).googleChat).accessToken (($cfg.gateway).googleChat).audience }}
      {{- $hasWecom := and (($cfg.gateway).wecom).corpId (($cfg.gateway).wecom).agentId (($cfg.gateway).wecom).secret (($cfg.gateway).wecom).token (($cfg.gateway).wecom).encodingAesKey }}
        - name: gateway
          image: {{ printf "%s:%s" (($cfg.gateway).image | default "ghcr.io/openabdev/openab-gateway") (($cfg.gateway).tag | default $.Chart.AppVersion) }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          {{- with $.Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- if ($cfg.gateway).token }}
            - name: GATEWAY_WS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $d }}
                  key: gateway-ws-token
            {{- end }}
            {{- if $hasTelegram }}
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $gwD }}
                  key: telegram-bot-token
            {{- if (($cfg.gateway).telegram).secretToken }}
            - name: TELEGRAM_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $gwD }}
                  key: telegram-secret-token
            {{- end }}
            {{- if (($cfg.gateway).telegram).webhookPath }}
            - name: TELEGRAM_WEBHOOK_PATH
              value: {{ (($cfg.gateway).telegram).webhookPath | quote }}
            {{- end }}
            {{- end }}
            {{- if $hasLine }}
            - name: LINE_CHANNEL_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $gwD }}
                  key: line-channel-secret
            {{- if (($cfg.gateway).line).channelAccessToken }}
            - name: LINE_CHANNEL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $gwD }}
                  key: line-channel-access-token
            {{- end }}
            {{- end }}
            {{- if $hasTeams }}
            - name: TEAMS_APP_ID
              value: {{ ($cfg.gateway).teams.appId | quote }}
            - name: TEAMS_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $gwD }}
                  key: teams-app-secret
            {{- if ($cfg.gateway).teams.oauthEndpoint }}
            - name: TEAMS_OAUTH_ENDPOINT
              value: {{ ($cfg.gateway).teams.oauthEndpoint | quote }}
            {{- end }}
            {{- if ($cfg.gateway).teams.allowedTenants }}
            - name: TEAMS_ALLOWED_TENANTS
              value: {{ ($cfg.gateway).teams.allowedTenants | join "," | quote }}
            {{- end }}
            {{- end }}
            {{- if $hasFeishu }}
            - name: FEISHU_APP_ID
              value: {{ ($cfg.gateway).feishu.appId | quote }}
            - name: FEISHU_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $gwD }}
                  key: feishu-app-secret
            {{- if ($cfg.gateway).feishu.domain }}
            - name: FEISHU_DOMAIN
              value: {{ ($cfg.gateway).feishu.domain | quote }}
            {{- end }}
            {{- if ($cfg.gateway).feishu.connectionMode }}
            - name: FEISHU_CONNECTION_MODE
              value: {{ ($cfg.gateway).feishu.connectionMode | quote }}
            {{- end }}
            {{- end }}
            {{- if $hasGoogleChat }}
            - name: GOOGLE_CHAT_ENABLED
              value: "true"
            {{- if (($cfg.gateway).googleChat).audience }}
            - name: GOOGLE_CHAT_AUDIENCE
              value: {{ ($cfg.gateway).googleChat.audience | quote }}
            {{- end }}
            {{- if (($cfg.gateway).googleChat).saKeyJson }}
            - name: GOOGLE_CHAT_SA_KEY_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $gwD }}
                  key: google-chat-sa-key-json
            {{- end }}
            {{- end }}
            {{- if $hasWecom }}
            - name: WECOM_CORP_ID
              value: {{ ($cfg.gateway).wecom.corpId | quote }}
            - name: WECOM_AGENT_ID
              value: {{ ($cfg.gateway).wecom.agentId | quote }}
            - name: WECOM_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $gwD }}
                  key: wecom-secret
            - name: WECOM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $gwD }}
                  key: wecom-token
            - name: WECOM_ENCODING_AES_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab.agentFullname" $gwD }}
                  key: wecom-encoding-aes-key
            {{- end }}
            - name: RUST_LOG
              value: {{ ($cfg.gateway).rustLog | default "info" | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          {{- with ($cfg.gateway).resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with ($cfg.gateway).extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with ($cfg.gateway).extraContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with $cfg.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cfg.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cfg.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "openab.agentFullname" $d }}
        {{- if $pvcEnabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ (and $cfg.persistence $cfg.persistence.existingClaim) | default (include "openab.agentFullname" $d) }}
        {{- end }}
        - name: tmp
          emptyDir: {}
        {{- with $cfg.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if eq (($cfg.gateway).colocated | toString) "true" }}
        {{- with ($cfg.gateway).extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- end }}
{{- end }}
{{- end }}
